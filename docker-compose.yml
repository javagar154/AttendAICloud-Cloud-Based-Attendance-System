version: "3"
services:
  backend:
    build: ./backend
    ports:
      - "8080:8080"
    environment:
      - AWS_ACCESS_KEY_ID=fake_access_key
      - AWS_SECRET_ACCESS_KEY=fake_secret_key
      - AWS_REGION=us-east-1
      - DUMMY_MODE=true

  frontend:
    build: ./frontend
    ports:
      - "80:80"